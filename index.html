<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Sail Manager</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg0:#0F1117;--bg1:#161B27;--bg2:#1E2535;
  --border:#2A3347;--border2:#3A4560;
  --text1:#E8EDF5;--text2:#8B96AB;--text3:#5A6478;
  --accent:#1D9E75;--accent2:#0F6E56;
  --red-bg:#2D1A1A;--red-bd:#5C2D2D;--red-t:#F09595;
  --amber-bg:#2D2210;--amber-bd:#5C4020;--amber-t:#FAC775;
  --green-bg:#0F2010;--green-bd:#1D4020;--green-t:#9FE1CB;
  --teal-bg:#0A1E18;--teal-bd:#0F3828;--teal-t:#5DCAA5;
  --blue-bg:#0F1A2D;--blue-bd:#1A2F50;--blue-t:#85B7EB;
  --gray-bg:#1A1E28;--gray-bd:#2A3040;--gray-t:#8B96AB;
  --nav-h:62px;
}
html,body{height:100%;background:var(--bg0);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg1);border-bottom:0.5px solid var(--border);flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:8px;}
.topbar-logo{font-size:20px;color:var(--accent);}
.topbar-title{font-size:15px;font-weight:500;color:var(--text1);}
.topbar-actions{display:flex;gap:8px;}
.icon-btn{background:transparent;border:0.5px solid var(--border2);width:36px;height:36px;border-radius:8px;cursor:pointer;color:var(--text2);font-size:18px;display:flex;align-items:center;justify-content:center;}
.icon-btn:active{background:var(--bg2);}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px;padding-bottom:calc(var(--nav-h) + 16px);}
.view{display:none;}.view.active{display:block;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:var(--nav-h);background:var(--bg1);border-top:0.5px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:10px;border:none;background:transparent;}
.nav-tab:active{background:var(--bg2);}
.nav-tab.active{color:var(--accent);}
.nav-tab.danger.active{color:#F09595;}
.nav-tab i{font-size:22px;}
.nav-dot{width:7px;height:7px;background:#E24B4A;border-radius:50%;position:absolute;top:8px;right:calc(50% - 18px);}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.metric{background:var(--bg2);border-radius:8px;padding:10px 12px;}
.metric-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:3px;}
.metric-val{font-size:22px;font-weight:500;color:var(--text1);}
.sec-hd{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;margin:0 0 8px;}
.alert{display:flex;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:6px;font-size:12px;border:0.5px solid;}
.alert.danger{background:var(--red-bg);border-color:var(--red-bd);color:var(--red-t);}
.alert.warn{background:var(--amber-bg);border-color:var(--amber-bd);color:var(--amber-t);}
.card{background:var(--bg1);border:0.5px solid var(--border);border-radius:10px;padding:12px;margin-bottom:8px;}
.card.expanded{border-color:var(--accent);}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;}
.b-red{background:var(--red-bg);color:var(--red-t);border:0.5px solid var(--red-bd);}
.b-amber{background:var(--amber-bg);color:var(--amber-t);border:0.5px solid var(--amber-bd);}
.b-green{background:var(--green-bg);color:var(--green-t);border:0.5px solid var(--green-bd);}
.b-teal{background:var(--teal-bg);color:var(--teal-t);border:0.5px solid var(--teal-bd);}
.b-gray{background:var(--gray-bg);color:var(--gray-t);border:0.5px solid var(--gray-bd);}
.todo-input-row{display:flex;gap:8px;margin-bottom:10px;}
.todo-input-row input{flex:1;background:var(--bg2);border:0.5px solid var(--border);color:var(--text1);padding:8px 10px;border-radius:8px;font-size:13px;outline:none;}
.todo-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);font-size:13px;color:var(--text1);}
.todo-item:last-child{border-bottom:none;}
.todo-item input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;}
.chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none;}
.chips::-webkit-scrollbar{display:none;}
.chip{padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:0.5px solid var(--border2);background:transparent;color:var(--text2);white-space:nowrap;flex-shrink:0;}
.chip.active{background:var(--accent);color:white;border-color:var(--accent);}
.proj-title{font-size:13px;font-weight:500;color:var(--text1);}
.proj-next{font-size:12px;color:var(--text3);margin-top:3px;}
.form-label{font-size:11px;color:var(--text2);margin-bottom:3px;display:block;}
input[type=text],input[type=date],input[type=time],select,textarea{background:var(--bg2);border:0.5px solid var(--border);color:var(--text1);padding:8px 10px;border-radius:8px;font-size:13px;width:100%;outline:none;}
select option{background:var(--bg2);}
textarea{resize:none;}
.btn-primary{background:var(--accent);color:white;border:none;padding:10px 16px;border-radius:8px;font-size:13px;cursor:pointer;min-height:42px;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-primary:active{background:var(--accent2);}
.btn-ghost{background:transparent;border:0.5px solid var(--border2);padding:10px 14px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--text2);min-height:42px;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-ghost:active{background:var(--bg2);}
.btn-danger{background:var(--red-bg);color:var(--red-t);border:0.5px solid var(--red-bd);padding:10px 14px;border-radius:8px;font-size:13px;cursor:pointer;min-height:42px;}
.btn-row{display:flex;gap:8px;margin-top:12px;}
.btn-row .btn-primary,.btn-row .btn-ghost{flex:1;}
.cal-day-hd{text-align:center;font-size:10px;color:var(--text3);padding:4px 0;font-weight:500;}
.cal-day{min-height:52px;padding:3px;border:0.5px solid var(--border);border-radius:4px;background:var(--bg1);cursor:pointer;}
.cal-day.today{border-color:var(--accent);}
.cal-day.other-month{opacity:0.3;}
.cal-day-num{font-size:10px;color:var(--text3);margin-bottom:1px;}
.cal-day.today .cal-day-num{color:var(--teal-t);font-weight:500;}
.cal-event{font-size:8px;padding:1px 3px;border-radius:2px;margin-bottom:1px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-weight:500;}
.ce-prod{background:var(--green-bg);color:var(--green-t);}
.ce-pipe{background:var(--blue-bg);color:var(--blue-t);}
.ce-crit{background:var(--red-bg);color:var(--red-t);}
.ce-meet{background:var(--teal-bg);color:var(--teal-t);}
.ce-task{background:var(--amber-bg);color:var(--amber-t);}
.hours-summary{background:var(--bg2);border-radius:10px;padding:14px;margin-bottom:14px;}
.hour-entry{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg1);border:0.5px solid var(--border);border-radius:8px;margin-bottom:6px;}
.stepper{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.stepper-btn{width:34px;height:34px;border:0.5px solid var(--border2);border-radius:8px;background:transparent;cursor:pointer;font-size:18px;color:var(--text2);display:flex;align-items:center;justify-content:center;}
.stepper-btn:active{background:var(--bg2);}
.kanban-box{background:var(--bg2);border-radius:10px;padding:14px;margin-top:12px;}
.kanban-line{font-size:14px;font-weight:500;padding:6px 0;border-bottom:0.5px solid var(--border);color:var(--text1);}
.kanban-line:last-child{border-bottom:none;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg1);border-radius:16px 16px 0 0;border-top:0.5px solid var(--border);padding:16px;width:100%;max-height:92vh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 14px;}
.modal-title{font-size:15px;font-weight:500;color:var(--text1);margin-bottom:14px;}
.save-status{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--green-bg);border:0.5px solid var(--green-bd);color:var(--green-t);padding:6px 14px;border-radius:20px;font-size:12px;z-index:200;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.save-status.show{opacity:1;}
.priority-badge{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.section-label{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;padding:8px 0 4px;border-bottom:0.5px solid var(--border);margin-bottom:6px;}
</style>
</head>
<body>

<div class="app">

<div class="topbar">
  <div class="topbar-left">
    <i class="ti ti-sailboat topbar-logo" aria-hidden="true"></i>
    <span class="topbar-title" id="view-title">Daily</span>
  </div>
  <div class="topbar-actions">
    <button class="icon-btn" onclick="openModal('event')" aria-label="Nuevo evento"><i class="ti ti-calendar-plus" aria-hidden="true"></i></button>
    <button class="icon-btn" onclick="openModal('project')" aria-label="Nuevo proyecto" style="background:var(--accent);border-color:var(--accent);color:white;"><i class="ti ti-plus" aria-hidden="true"></i></button>
  </div>
</div>

<div class="content">

  <!-- DAILY -->
  <div class="view active" id="view-daily">
    <div class="metrics">
      <div class="metric"><div class="metric-label">Activos</div><div class="metric-val" id="m-total">0</div></div>
      <div class="metric"><div class="metric-label">Producción</div><div class="metric-val" id="m-prod" style="color:var(--green-t);">0</div></div>
      <div class="metric"><div class="metric-label">Críticos</div><div class="metric-val" id="m-crit" style="color:var(--red-t);">0</div></div>
      <div class="metric"><div class="metric-label">En espera</div><div class="metric-val" id="m-gest" style="color:var(--amber-t);">0</div></div>
    </div>
    <div class="sec-hd">Alertas</div>
    <div id="daily-alerts" style="margin-bottom:14px;"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <div class="sec-hd" style="margin:0;">To-do list</div>
      <span id="todo-count" style="font-size:11px;color:var(--text3);"></span>
    </div>
    <div class="card">
      <div class="todo-input-row">
        <input type="text" id="todo-input" placeholder="Nueva tarea..." onkeydown="if(event.key==='Enter')addTodo()"/>
        <button class="btn-primary" onclick="addTodo()" style="padding:8px 12px;min-height:38px;"><i class="ti ti-plus" aria-hidden="true"></i></button>
      </div>
      <div id="todo-list"></div>
      <div id="todo-empty" style="font-size:12px;color:var(--text3);text-align:center;padding:8px 0;">Sin tareas pendientes</div>
    </div>
    <button class="btn-ghost" style="font-size:12px;width:100%;margin-top:4px;" onclick="clearDone()">Limpiar completadas</button>
  </div>

  <!-- PROJECTS -->
  <div class="view" id="view-projects">
    <div class="chips">
      <button class="chip active" onclick="filterProj('all',this)">Todos</button>
      <button class="chip" onclick="filterProj('critico',this)">Críticos</button>
      <button class="chip" onclick="filterProj('produccion',this)">Producción</button>
      <button class="chip" onclick="filterProj('gestion',this)">Gestión</button>
      <button class="chip" onclick="filterProj('listo',this)">Listos</button>
      <button class="chip" onclick="filterProj('aplazado',this)">Aplazados</button>
    </div>
    <div id="proj-list"></div>
    <button class="btn-primary" style="width:100%;margin-top:4px;" onclick="addNewProject()"><i class="ti ti-plus" aria-hidden="true"></i> Nuevo proyecto</button>
  </div>

  <!-- CALENDAR -->
  <div class="view" id="view-calendar">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <button class="icon-btn" onclick="changeMonth(-1)" aria-label="Mes anterior"><i class="ti ti-chevron-left" aria-hidden="true"></i></button>
      <div style="font-size:14px;font-weight:500;color:var(--text1);" id="cal-title"></div>
      <button class="icon-btn" onclick="changeMonth(1)" aria-label="Mes siguiente"><i class="ti ti-chevron-right" aria-hidden="true"></i></button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;" id="cal-grid"></div>
    <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;">
      <span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);"><span style="width:8px;height:8px;background:var(--green-bg);border:0.5px solid var(--green-bd);border-radius:2px;display:inline-block;"></span>Prod.</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);"><span style="width:8px;height:8px;background:var(--blue-bg);border:0.5px solid var(--blue-bd);border-radius:2px;display:inline-block;"></span>Pipeline</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);"><span style="width:8px;height:8px;background:var(--red-bg);border:0.5px solid var(--red-bd);border-radius:2px;display:inline-block;"></span>Crítico</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);"><span style="width:8px;height:8px;background:var(--teal-bg);border:0.5px solid var(--teal-bd);border-radius:2px;display:inline-block;"></span>Reunión</span>
    </div>
  </div>

  <!-- GANTT -->
  <div class="view" id="view-gantt">
    <div style="font-size:11px;color:var(--text2);margin-bottom:8px;">Desliza para ver el timeline completo</div>
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;" id="gantt-container"></div>
  </div>

  <!-- HOURS -->
  <div class="view" id="view-hours">
    <div class="hours-summary">
      <div style="font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;">Total hoy</div>
      <div style="display:flex;align-items:baseline;justify-content:space-between;">
        <div style="font-size:28px;font-weight:500;color:var(--text1);"><span id="total-hours">0</span><span style="font-size:13px;color:var(--text2);margin-left:4px;">/ 8h</span></div>
        <div style="display:flex;gap:16px;">
          <div style="text-align:right;"><div style="font-size:16px;font-weight:500;color:var(--green-t);" id="bill-hours">0h</div><div style="font-size:10px;color:var(--text3);">Fact.</div></div>
          <div style="text-align:right;"><div style="font-size:16px;font-weight:500;color:var(--text3);" id="nobill-hours">0h</div><div style="font-size:10px;color:var(--text3);">No fact.</div></div>
        </div>
      </div>
    </div>
    <div class="sec-hd">Horas de hoy</div>
    <div id="hour-entries"></div>
    <select id="new-proj" style="width:100%;margin-bottom:8px;font-size:13px;">
      <option value="">Selecciona proyecto...</option>
      <optgroup label="Facturables" id="billable-opts"></optgroup>
      <optgroup label="No facturables">
        <option value="Oficina técnica|nobill">Oficina técnica</option>
        <option value="Reuniones internas|nobill">Reuniones internas</option>
        <option value="Gestión / admin|nobill">Gestión / admin</option>
        <option value="Limpieza nave|nobill">Limpieza nave</option>
        <option value="Organización velas|nobill">Organización velas</option>
        <option value="Mantenimiento máquinas|nobill">Mantenimiento máquinas</option>
        <option value="Trainning|nobill">Trainning</option>
        <option value="I+D|nobill">I+D</option>
      </optgroup>
    </select>
    <button class="btn-primary" style="width:100%;" onclick="addEntry()"><i class="ti ti-plus" aria-hidden="true"></i> Añadir</button>
    <div class="kanban-box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div style="font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;">Para Kanbanize</div>
        <button id="copy-btn" onclick="copyKanban()" style="background:var(--accent);color:white;border:none;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px;"><i class="ti ti-copy" aria-hidden="true"></i> Copiar</button>
      </div>
      <div id="kanban-lines"><div style="font-size:12px;color:var(--text3);">Añade horas para ver el resumen</div></div>
    </div>
    <button onclick="hourEntries=[];persist();renderHours();" class="btn-ghost" style="width:100%;margin-top:10px;font-size:12px;">Nueva jornada (limpiar)</button>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-tab active" onclick="nav('daily',this)"><i class="ti ti-sun" aria-hidden="true"></i><span>Daily</span></button>
  <button class="nav-tab" onclick="nav('projects',this)"><i class="ti ti-list-check" aria-hidden="true"></i><span>Proyectos</span></button>
  <button class="nav-tab" onclick="nav('calendar',this)"><i class="ti ti-calendar-month" aria-hidden="true"></i><span>Calendario</span></button>
  <button class="nav-tab" onclick="nav('gantt',this)"><i class="ti ti-chart-gantt" aria-hidden="true"></i><span>Gantt</span></button>
  <button class="nav-tab danger" onclick="nav('hours',this)" style="position:relative;"><i class="ti ti-clock" aria-hidden="true"></i><span>Jornada</span><span class="nav-dot" id="hours-dot" style="display:none;"></span></button>
</div>

<!-- MODAL EVENT -->
<div class="modal-overlay" id="modal-event">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Nuevo evento</div>
    <div style="margin-bottom:8px;"><label class="form-label">Título</label><input type="text" id="ev-title" placeholder="Ej: TAPIOCA - Revisión"/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
      <div><label class="form-label">Fecha</label><input type="date" id="ev-date"/></div>
      <div><label class="form-label">Calendario</label><select id="ev-cal"><option>Calendario Pau</option><option>New Sails Pipeline</option></select></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
      <div><label class="form-label">Hora inicio</label><input type="time" id="ev-start"/></div>
      <div><label class="form-label">Hora fin</label><input type="time" id="ev-end"/></div>
    </div>
    <div style="margin-bottom:8px;"><label class="form-label">Notas</label><textarea id="ev-notes" style="height:60px;"></textarea></div>
    <div class="btn-row">
      <button class="btn-ghost" onclick="closeModal('event')">Cancelar</button>
      <button class="btn-primary" onclick="copyEventText()"><i class="ti ti-clipboard-copy" aria-hidden="true"></i> Copiar para Claude</button>
    </div>
  </div>
</div>

<!-- MODAL PROJECT -->
<div class="modal-overlay" id="modal-project">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="proj-modal-title">Nuevo proyecto</div>
    <div style="margin-bottom:8px;"><label class="form-label">Nombre</label><input type="text" id="pj-name" placeholder="Ej: Capriccio - New Jib"/></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
      <div><label class="form-label">Estado</label><select id="pj-status"><option value="produccion">Producción</option><option value="gestion">Gestión</option><option value="critico">Crítico</option><option value="listo">Listo</option><option value="aplazado">Aplazado</option></select></div>
      <div><label class="form-label">Urgencia</label><select id="pj-urgency"><option value="alta">Alta</option><option value="media">Media</option><option value="baja">Baja</option></select></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
      <div><label class="form-label">Deadline</label><input type="date" id="pj-deadline"/></div>
      <div><label class="form-label">Responsable</label><input type="text" id="pj-owner" placeholder="Nombre"/></div>
    </div>
    <div style="margin-bottom:8px;"><label class="form-label">Próxima acción</label><input type="text" id="pj-next"/></div>
    <div style="margin-bottom:8px;"><label class="form-label">Notas</label><textarea id="pj-notes" style="height:60px;"></textarea></div>
    <div class="btn-row">
      <button class="btn-ghost" onclick="closeModal('project')">Cancelar</button>
      <button class="btn-primary" id="pj-save-btn" onclick="saveProjectModal()"><i class="ti ti-check" aria-hidden="true"></i> Guardar</button>
    </div>
  </div>
</div>

<!-- SAVE STATUS -->
<div class="save-status" id="save-status">Guardado</div>

// STORAGE — triple fallback: localStorage → sessionStorage → memory
const MEM={};
function store(k,v){
  const s=JSON.stringify(v);
  try{localStorage.setItem(k,s);}catch(e){}
  try{sessionStorage.setItem(k,s);}catch(e){}
  MEM[k]=s;
}
function retrieve(k,def){
  let s=null;
  try{s=localStorage.getItem(k);}catch(e){}
  if(!s){try{s=sessionStorage.getItem(k);}catch(e){}}
  if(!s){s=MEM[k]||null;}
  if(!s)return def;
  try{return JSON.parse(s);}catch(e){return def;}
}

let projects=retrieve('sm-p',DP);
let todos=retrieve('sm-t',[]);
let hourEntries=retrieve('sm-h',[]);
let editingProjId=null;
let projFilter='all';
let calYear=2026,calMonth=4;
let expandedId=null;

function persist(){
  store('sm-p',projects);
  store('sm-t',todos);
  store('sm-h',hourEntries);
  showSaved();
}

function showSaved(){
  const el=document.getElementById('save-status');
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1500);
}

function sortProjects(list){
  return [...list].sort((a,b)=>{
    const sp=PRIORITY_ORDER[a.status]-PRIORITY_ORDER[b.status];
    if(sp!==0)return sp;
    const su=URGENCY_ORDER[a.urgency]-URGENCY_ORDER[b.urgency];
    if(su!==0)return su;
    if(a.deadline&&b.deadline)return new Date(a.deadline)-new Date(b.deadline);
    if(a.deadline)return -1;
    if(b.deadline)return 1;
    return 0;
  });
}

function nav(id,el){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(n=>n.classList.remove('active'));
  document.getElementById('view-'+id).classList.add('active');
  if(el)el.classList.add('active');
  const t={daily:'Daily',projects:'Proyectos',calendar:'Calendario',gantt:'Gantt',hours:'Cerrar jornada'};
  document.getElementById('view-title').textContent=t[id];
  if(id==='daily')renderDaily();
  if(id==='calendar')renderCal();
  if(id==='gantt')renderGantt();
  if(id==='projects')renderProjects(projFilter);
  if(id==='hours'){document.getElementById('hours-dot').style.display='none';renderHours();updateBillOpts();}
}

function renderDaily(){
  document.getElementById('m-total').textContent=projects.length;
  document.getElementById('m-prod').textContent=projects.filter(p=>p.status==='produccion').length;
  document.getElementById('m-crit').textContent=projects.filter(p=>p.status==='critico').length;
  document.getElementById('m-gest').textContent=projects.filter(p=>p.status==='gestion'||p.status==='listo').length;
  const al=document.getElementById('daily-alerts');
  const crits=projects.filter(p=>p.status==='critico');
  const soon=projects.filter(p=>{if(!p.deadline)return false;const d=(new Date(p.deadline)-new Date())/86400000;return d>=0&&d<=5&&p.status!=='critico';});
  let html='';
  crits.forEach(p=>{html+=`<div class="alert danger"><i class="ti ti-alert-triangle" style="font-size:14px;flex-shrink:0;margin-top:1px;" aria-hidden="true"></i><span><strong>${p.name}</strong> — ${p.next}</span></div>`;});
  soon.forEach(p=>{html+=`<div class="alert warn"><i class="ti ti-clock" style="font-size:14px;flex-shrink:0;margin-top:1px;" aria-hidden="true"></i><span><strong>${p.name}</strong> — Deadline ${p.deadline}</span></div>`;});
  if(!html)html='<div style="font-size:12px;color:var(--text3);padding:4px 0 10px;">Sin alertas críticas hoy</div>';
  al.innerHTML=html;
  renderTodos();
}

function addTodo(){
  const inp=document.getElementById('todo-input');
  const t=inp.value.trim();
  if(!t)return;
  todos.push({id:Date.now(),text:t,done:false});
  inp.value='';
  persist();
  renderTodos();
}
function renderTodos(){
  const list=document.getElementById('todo-list'),empty=document.getElementById('todo-empty'),count=document.getElementById('todo-count');
  const p=todos.filter(t=>!t.done).length;
  count.textContent=p?`(${p} pendiente${p!==1?'s':''})`:' ';
  if(!todos.length){empty.style.display='block';list.innerHTML='';return;}
  empty.style.display='none';
  list.innerHTML=todos.map((t,i)=>`<div class="todo-item"><input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo(${i})"/><span style="flex:1;${t.done?'text-decoration:line-through;color:var(--text3);':''}">${t.text}</span><button onclick="deleteTodo(${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:20px;padding:0 4px;" aria-label="Eliminar">×</button></div>`).join('');
}
function toggleTodo(i){todos[i].done=!todos[i].done;persist();renderTodos();}
function deleteTodo(i){todos.splice(i,1);persist();renderTodos();}
function clearDone(){todos=todos.filter(t=>!t.done);persist();renderTodos();}

function filterProj(f,el){
  projFilter=f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderProjects(f);
}

function addNewProject(){
  editingProjId=null;
  document.getElementById('proj-modal-title').textContent='Nuevo proyecto';
  document.getElementById('pj-name').value='';
  document.getElementById('pj-status').value='gestion';
  document.getElementById('pj-urgency').value='media';
  document.getElementById('pj-deadline').value='';
  document.getElementById('pj-owner').value='';
  document.getElementById('pj-next').value='';
  document.getElementById('pj-notes').value='';
  openModal('project');
}

function editProject(id){
  const p=projects.find(x=>x.id===id);
  if(!p)return;
  editingProjId=id;
  document.getElementById('proj-modal-title').textContent='Editar proyecto';
  document.getElementById('pj-name').value=p.name;
  document.getElementById('pj-status').value=p.status;
  document.getElementById('pj-urgency').value=p.urgency;
  document.getElementById('pj-deadline').value=p.deadline||'';
  document.getElementById('pj-owner').value=p.owner||'';
  document.getElementById('pj-next').value=p.next||'';
  document.getElementById('pj-notes').value=p.notes||'';
  openModal('project');
}

function saveProjectModal(){
  const name=document.getElementById('pj-name').value.trim();
  if(!name){alert('El nombre es obligatorio');return;}
  const data={
    name,
    status:document.getElementById('pj-status').value,
    urgency:document.getElementById('pj-urgency').value,
    deadline:document.getElementById('pj-deadline').value,
    owner:document.getElementById('pj-owner').value,
    next:document.getElementById('pj-next').value,
    notes:document.getElementById('pj-notes').value,
  };
  if(editingProjId){
    projects=projects.map(p=>p.id===editingProjId?{...p,...data}:p);
  } else {
    projects.unshift({id:Date.now(),...data});
  }
  persist();
  closeModal('project');
  renderProjects(projFilter);
  updateBillOpts();
  editingProjId=null;
}

function deleteProject(id){
  if(!confirm('¿Eliminar este proyecto?'))return;
  projects=projects.filter(p=>p.id!==id);
  persist();
  closeModal('project');
  renderProjects(projFilter);
  updateBillOpts();
  editingProjId=null;
}

function renderProjects(filter){
  const list=document.getElementById('proj-list');
  let filtered=filter==='all'?projects:projects.filter(p=>p.status===filter);
  filtered=sortProjects(filtered);

  // Group by status for 'all' view
  if(filter==='all'){
    const groups=[
      {key:'critico',label:'Críticos'},
      {key:'produccion',label:'En producción'},
      {key:'listo',label:'Listos para entregar'},
      {key:'gestion',label:'En gestión'},
      {key:'aplazado',label:'Aplazados'},
    ];
    let html='';
    groups.forEach(g=>{
      const items=filtered.filter(p=>p.status===g.key);
      if(!items.length)return;
      html+=`<div class="section-label">${g.label} (${items.length})</div>`;
      items.forEach(p=>{html+=projCard(p);});
    });
    list.innerHTML=html;
  } else {
    list.innerHTML=filtered.map(p=>projCard(p)).join('');
  }
}

function projCard(p){
  const urgDot={alta:'#F09595',media:'#FAC775',baja:'var(--text3)'};
  return `<div class="card" onclick="editProject(${p.id})">
    <div style="display:flex;align-items:flex-start;gap:8px;">
      <div class="priority-badge" style="background:${urgDot[p.urgency]};margin-top:4px;"></div>
      <div style="flex:1;min-width:0;">
        <div class="proj-title">${p.name}</div>
        <div class="proj-next">${p.next||'—'}</div>
        ${p.deadline?`<div style="font-size:11px;color:var(--text3);margin-top:3px;"><i class="ti ti-calendar" style="font-size:11px;" aria-hidden="true"></i> ${p.deadline}</div>`:''}
      </div>
      <span class="badge ${SB[p.status]}" style="flex-shrink:0;">${SL[p.status]}</span>
    </div>
  </div>`;
}

function updateBillOpts(){
  const og=document.getElementById('billable-opts');
  if(!og)return;
  og.innerHTML=sortProjects(projects).filter(p=>p.status!=='aplazado').map(p=>`<option value="${p.name}|bill">${p.name}</option>`).join('');
}

const CE=[
  {date:'2026-05-04',label:'Geist Jib',type:'ce-task'},{date:'2026-05-05',label:'Privilege Main',type:'ce-pipe'},

  {date:'2026-05-21',label:'Geist',type:'ce-prod'},{date:'2026-05-25',label:'Meeting',type:'ce-meet'},

function changeMonth(d){calMonth+=d;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCal();}
function renderCal(){
  document.getElementById('cal-title').textContent=MN[calMonth]+' '+calYear;
  const g=document.getElementById('cal-grid');
  g.innerHTML=DN.map(d=>`<div class="cal-day-hd">${d}</div>`).join('');
  const f=new Date(calYear,calMonth,1),sd=(f.getDay()+6)%7,dim=new Date(calYear,calMonth+1,0).getDate(),pd=new Date(calYear,calMonth,0).getDate(),t=new Date();
  for(let i=0;i<sd;i++)g.innerHTML+=`<div class="cal-day other-month"><div class="cal-day-num">${pd-sd+1+i}</div></div>`;
  for(let d=1;d<=dim;d++){
    const ds=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isT=t.getFullYear()===calYear&&t.getMonth()===calMonth&&t.getDate()===d;
    const evs=[...CE.filter(e=>e.date===ds),...projects.filter(p=>p.deadline===ds).map(p=>({label:p.name.split(/[\s-]/)[0],type:'ce-prod'}))];
    const u=[...new Map(evs.map(e=>[e.label,e])).values()];
    g.innerHTML+=`<div class="cal-day${isT?' today':''}" onclick="calClick('${ds}')"><div class="cal-day-num">${d}</div>${u.slice(0,2).map(e=>`<div class="cal-event ${e.type}">${e.label}</div>`).join('')}${u.length>2?`<div style="font-size:8px;color:var(--text3);">+${u.length-2}</div>`:''}</div>`;
  }
  const r=(7-(sd+dim)%7)%7;
  for(let i=1;i<=r;i++)g.innerHTML+=`<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
}
function calClick(d){document.getElementById('ev-date').value=d;openModal('event');}

const GD=[
  {label:'Bugia Bianca',s:30,e:45,t:'prod'},{label:'Tsitica',s:28,e:42,t:'prod'},
  {label:'Geist',s:34,e:51,t:'prod'},{label:'Capriccio',s:48,e:56,t:'prod'},
  {label:'Capriccio pre',s:4,e:48,t:'pipe'},{label:'Priv.Main',s:57,e:71,t:'prod'},
  {label:'Priv.Main pre',s:4,e:57,t:'pipe'},{label:'Priv.Jib',s:72,e:85,t:'prod'},
  {label:'Priv.Jib pre',s:4,e:72,t:'pipe'},{label:'Priv.650',s:0,e:83,t:'pipe'},
];
function renderGantt(){
  const c=document.getElementById('gantt-container'),MAX=90,TODAY=55;
  const col={prod:{bg:'#085041',c:'#5DCAA5'},pipe:{bg:'#0C447C',c:'#85B7EB'}};
  const lb=[{l:'Abr',p:0},{l:'May',p:33},{l:'Jun',p:66},{l:'Jul',p:100}];
  let h=`<div style="padding-left:106px;min-width:380px;height:18px;margin-bottom:6px;position:relative;">${lb.map(l=>`<span style="position:absolute;left:${l.p}%;font-size:10px;color:var(--text3);transform:translateX(-50%);">${l.l}</span>`).join('')}</div>`;
  GD.forEach(p=>{
    const left=Math.round(p.s/MAX*100),w=Math.round((p.e-p.s)/MAX*100),tp=Math.round(TODAY/MAX*100),cl=col[p.t];
    h+=`<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;min-width:380px;"><div style="width:100px;min-width:100px;font-size:11px;font-weight:500;color:var(--text1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${p.label}</div><div style="flex:1;height:18px;background:var(--bg2);border-radius:3px;position:relative;"><div style="position:absolute;left:${tp}%;width:2px;height:100%;background:#E24B4A;z-index:2;"></div><div style="position:absolute;left:${left}%;width:${w}%;height:100%;border-radius:3px;background:${cl.bg};display:flex;align-items:center;padding:0 5px;overflow:hidden;"><span style="font-size:9px;font-weight:500;color:${cl.c};white-space:nowrap;">${p.label}</span></div></div></div>`;
  });
  h+=`<div style="display:flex;gap:10px;margin-top:8px;"><span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);"><span style="width:8px;height:8px;background:#085041;border-radius:2px;display:inline-block;"></span>Prod.</span><span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);"><span style="width:8px;height:8px;background:#0C447C;border-radius:2px;display:inline-block;"></span>Pipeline</span><span style="display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text3);"><span style="width:2px;height:8px;background:#E24B4A;display:inline-block;"></span>Hoy</span></div>`;
  c.innerHTML=h;
}

function addEntry(){
  const sel=document.getElementById('new-proj');
  const v=sel.value;if(!v)return;
  const[proj,t]=v.split('|');
  hourEntries.push({id:Date.now(),project:proj,hours:0.5,billable:t==='bill'});
  sel.value='';persist();renderHours();
}
function changeHours(i,d){hourEntries[i].hours=Math.max(0.5,Math.min(8,hourEntries[i].hours+d));persist();renderHours();}
function removeEntry(i){hourEntries.splice(i,1);persist();renderHours();}
function renderHours(){
  const c=document.getElementById('hour-entries');
  if(!hourEntries.length){
    c.innerHTML=`<div style="font-size:13px;color:var(--text3);text-align:center;padding:16px;border:0.5px dashed var(--border);border-radius:8px;margin-bottom:10px;">Selecciona los proyectos de hoy</div>`;
  } else {
    c.innerHTML=hourEntries.map((e,i)=>`<div class="hour-entry"><div style="flex:1;min-width:0;"><div style="font-size:13px;font-weight:500;color:var(--text1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.project}</div><div style="font-size:11px;color:var(--text3);">${e.billable?'Facturable':'No facturable'}</div></div><div class="stepper"><button class="stepper-btn" onclick="changeHours(${i},-0.5)" aria-label="Menos">−</button><span style="font-size:14px;font-weight:500;color:var(--text1);min-width:34px;text-align:center;">${e.hours}h</span><button class="stepper-btn" onclick="changeHours(${i},0.5)" aria-label="Más">+</button></div><button onclick="removeEntry(${i})" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:22px;padding:0 4px;" aria-label="Eliminar">×</button></div>`).join('');
  }
  const tot=hourEntries.reduce((s,e)=>s+e.hours,0);
  const bill=hourEntries.filter(e=>e.billable).reduce((s,e)=>s+e.hours,0);
  document.getElementById('total-hours').textContent=tot;
  document.getElementById('bill-hours').textContent=bill+'h';
  document.getElementById('nobill-hours').textContent=(tot-bill)+'h';
  const be=hourEntries.filter(e=>e.billable);
  document.getElementById('kanban-lines').innerHTML=be.length?be.map(e=>`<div class="kanban-line">${e.project} — ${e.hours}h</div>`).join(''):'<div style="font-size:12px;color:var(--text3);">Añade horas facturables para ver el resumen</div>';
}
function copyKanban(){
  const be=hourEntries.filter(e=>e.billable);if(!be.length)return;
  navigator.clipboard.writeText(be.map(e=>`${e.project} — ${e.hours}h`).join('\n')).then(()=>{
    const btn=document.getElementById('copy-btn');btn.style.background='var(--accent2)';btn.innerHTML='<i class="ti ti-check"></i> Copiado';
    setTimeout(()=>{btn.style.background='var(--accent)';btn.innerHTML='<i class="ti ti-copy"></i> Copiar';},2000);
  });
}

function openModal(t){document.getElementById('modal-'+t).classList.add('open');}
function closeModal(t){document.getElementById('modal-'+t).classList.remove('open');}
function copyEventText(){
  const title=document.getElementById('ev-title').value.trim(),date=document.getElementById('ev-date').value;
  if(!title||!date){alert('Rellena título y fecha');return;}
  const s=document.getElementById('ev-start').value,e=document.getElementById('ev-end').value,cal=document.getElementById('ev-cal').value;
  navigator.clipboard.writeText(`Crea un evento en Google Calendar: "${title}" el ${date}${s?' de '+s+' a '+e:''}${cal==='New Sails Pipeline'?' en el calendario New Sails Pipeline':''}`).then(()=>{alert('Copiado — pégalo en Claude');closeModal('event');});
}

if(now.getHours()>=14&&now.getMinutes()>=45)document.getElementById('hours-dot').style.display='block';

renderDaily();
updateBillOpts();
